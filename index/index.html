<!DOCTYPE html>
<html>
<head>
    <title>Cold Chain Monitoring System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Cold Chain Monitoring System</h1>
</header>

<div class="container">

    <div class="card">
        <h2>Temperature</h2>
        <h3 id="temp">4°C</h3>
    </div>

    <div class="card">
        <h2>Humidity</h2>
        <h3 id="humidity">60%</h3>
    </div>

    <div class="card">
        <h2>Location</h2>
        <h3 id="location">Hyderabad</h3>
    </div>

    <div class="card">
        <h2>Status</h2>
        <h3 id="status">Safe</h3>
    </div>

</div>

<button onclick="updateData()">Refresh Data</button>

<script src="script.js"></script>

</body>
</html>
